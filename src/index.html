<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odin Battleship</title>
</head>

<body>
  <header>
    <div class="header-text">Odin Battleship</div>
  </header>
  <div class="content">
    <div class="game"></div>
    <div class="options">
      <div class="win game-end"><span class="game-winner">You Win!</span></div>
      <button class="new-game game-end">New Game</button>
      <div class="turn game-playing">Current turn: <span class="current-turn"></span></div>
      <div class="options-header game-setup">Options</div>
      <div class="options-buttons game-setup">
        <button class="randomize-board game-setup">Randomize Board</button>
        <button class="start-game game-setup">Start Game</button>
      </div>
      <div class="setup-instructions game-setup">
        <div class="setup-instructions-title">Game Setup</div>
        <ul>
          <li>Left-click on a ship to move it</li>
          <li>Press SPACE or R to rotate a ship being moved</li>
          <li>Left-click a moving ship to place it</li>
        </ul>
      </div>
    </div>
  </div>
  <footer>
    <div class="footer-text">Made by BenStack 2026</div>
  </footer>
</body>

</html>
